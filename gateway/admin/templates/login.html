<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureAlert — Sign In</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-page="login">
    <div class="login-screen">
        <form class="login-card" id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="admin@company.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" required>
            </div>
            <button class="btn btn-primary btn-block" type="submit" id="login-btn">Sign In</button>
            <div class="error-msg" id="login-error" style="display: none;"></div>
        </form>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
