{{define "content"}}
<div class="page-header">
    <div class="page-header-left">
        <h1>Network</h1>
        <p>CGNAT address pool and network configuration</p>
    </div>
</div>

<div class="section-card">
    <div class="section-title">CGNAT Status</div>
    <div id="cgnat-status"></div>
</div>

<div class="section-card">
    <div class="section-title">Configure CGNAT</div>
    <form id="cgnat-form">
        <div class="toggle-row" style="margin-bottom: 16px;">
            <div>
                <div class="toggle-label">Enable CGNAT</div>
                <div class="toggle-sub">Assign tunnel IPs from the 100.64.0.0/10 range</div>
            </div>
            <button type="button" class="toggle" id="cgnat-toggle" onclick="toggleCGNAT()"></button>
        </div>
        <div class="form-row-3">
            <div class="form-group">
                <label>Pool Start</label>
                <input id="cgnat-start" placeholder="100.64.0.1">
            </div>
            <div class="form-group">
                <label>Pool End</label>
                <input id="cgnat-end" placeholder="100.64.255.254">
            </div>
            <div class="form-group">
                <label>Subnet Mask</label>
                <input id="cgnat-mask" placeholder="255.255.0.0" value="255.255.0.0">
            </div>
        </div>
        <button class="btn btn-primary" type="submit">Save Configuration</button>
    </form>
    <div id="cgnat-msg"></div>
</div>
{{end}}
