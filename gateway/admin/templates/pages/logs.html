{{define "content"}}
<div class="page-header">
    <div class="page-header-left">
        <h1>Logs</h1>
        <p>Admin event log and audit trail</p>
    </div>
    <button class="refresh-btn" onclick="loadLogs()" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
    </button>
</div>

<div class="section-card">
    <div class="section-title">Filters</div>
    <div class="form-row">
        <div class="form-group">
            <label>Level</label>
            <select id="log-level-filter" onchange="loadLogs()">
                <option value="">All Levels</option>
                <option value="info">Info</option>
                <option value="warn">Warning</option>
                <option value="error">Error</option>
            </select>
        </div>
        <div class="form-group">
            <label>Max Entries</label>
            <select id="log-limit-filter" onchange="loadLogs()">
                <option value="50">50</option>
                <option value="100" selected>100</option>
                <option value="200">200</option>
                <option value="500">500</option>
            </select>
        </div>
    </div>
</div>

<div class="section-card">
    <div class="section-title">Event Log (<span id="log-count">0</span> entries)</div>
    <div id="logs-content">
        <div class="loading-screen" style="padding: 32px;">
            <div class="loading-spinner"></div>
        </div>
    </div>
</div>
{{end}}
