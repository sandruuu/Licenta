{{define "content"}}
<div class="page-header">
    <div class="page-header-left">
        <h1>Settings</h1>
        <p>Gateway runtime configuration</p>
    </div>
</div>

<!-- ── Admin Account ─────────────────────────────────── -->
<div class="section-card">
    <div class="section-title">Admin Account</div>
    <div class="detail-grid" style="margin-bottom:16px">
        <div class="detail-row"><span>Email</span><span id="admin-email-display">—</span></div>
        <div class="detail-row"><span>Setup Date</span><span id="admin-setup-date">—</span></div>
    </div>

    <div class="section-title" style="margin-top:20px">Change Password</div>
    <form id="change-password-form">
        <div class="form-group">
            <label>Current Password</label>
            <input type="password" id="cur-password" autocomplete="current-password" required>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="Minimum 8 characters" autocomplete="new-password" required>
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="new-password-confirm" autocomplete="new-password" required>
            </div>
        </div>
        <button class="btn btn-primary" type="submit">Change Password</button>
    </form>
    <div id="change-pw-msg"></div>
</div>

<!-- ── Gateway Identity ──────────────────────────────── -->
<div class="section-card">
    <div class="section-title">Gateway Identity</div>
    <div class="detail-grid">
        <div class="detail-row"><span>FQDN</span><span id="admin-fqdn-display">—</span></div>
        <div class="detail-row"><span>Cloud Connection</span><span id="admin-enrolled-display">—</span></div>
    </div>
</div>

<!-- ── General Settings ──────────────────────────────── -->
<div class="section-card">
    <div class="section-title">General Settings</div>
    <form id="config-form">
        <div class="form-group">
            <label>Cloud URL</label>
            <input id="cfg-cloud-url" placeholder="https://cloud.company.com">
        </div>
        <div class="form-row-3">
            <div class="form-group">
                <label>Gateway Listen</label>
                <input id="cfg-gw-listen" placeholder=":8443">
            </div>
            <div class="form-group">
                <label>Portal Listen</label>
                <input id="cfg-portal-listen" placeholder=":9443">
            </div>
            <div class="form-group">
                <label>Admin Listen</label>
                <input id="cfg-admin-listen" placeholder=":8444">
            </div>
        </div>

        <div class="section-title" style="margin-top: 20px;">TLS Paths</div>
        <div class="form-row-3">
            <div class="form-group">
                <label>mTLS Certificate</label>
                <input id="cfg-mtls-cert" placeholder="/app/certs/mtls.crt">
            </div>
            <div class="form-group">
                <label>mTLS Key</label>
                <input id="cfg-mtls-key" placeholder="/app/certs/mtls.key">
            </div>
            <div class="form-group">
                <label>mTLS CA</label>
                <input id="cfg-mtls-ca" placeholder="/app/certs/ca.crt">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>SSL Certificate</label>
                <input id="cfg-ssl-cert" placeholder="/app/certs/ssl.crt">
            </div>
            <div class="form-group">
                <label>SSL Key</label>
                <input id="cfg-ssl-key" placeholder="/app/certs/ssl.key">
            </div>
        </div>
        <button class="btn btn-primary" type="submit">Save Settings</button>
    </form>
    <div id="config-msg"></div>
</div>
{{end}}
